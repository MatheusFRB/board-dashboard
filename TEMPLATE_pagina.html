<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Academy · Minha Página</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/msal.js/2.38.3/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --dark: #0D0D0D;
    --dark-card: #181818;
    --text: #F0EDE8;
    --text-muted: #7A7572;
    --border: rgba(201,168,76,0.15);
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
  }
  .nav-back {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text-muted);
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--gold); }
  .nav-brand {
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text);
  }
  .nav-user { font-size: 12px; color: var(--text-muted); }

  main {
    max-width: 1100px; margin: 0 auto; padding: 60px 40px;
  }
  .page-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
  }
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 400; margin-bottom: 40px;
  }

  /* ===== ÁREA DE CONTEÚDO DO COLABORADOR ===== */
  /* Substitua tudo abaixo pelo seu conteúdo     */

  .placeholder-box {
    border: 1px dashed rgba(201,168,76,0.2);
    border-radius: 2px;
    padding: 80px 40px;
    text-align: center;
    color: var(--text-muted);
  }
  .placeholder-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 400;
    color: var(--text); margin-bottom: 12px;
  }
  .placeholder-box p { font-size: 13px; line-height: 1.7; max-width: 380px; margin: 0 auto; }
  .placeholder-box code {
    display: inline-block; margin-top: 20px;
    background: rgba(201,168,76,0.08); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 2px; font-size: 12px; color: var(--gold);
  }
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="../home.html">← Voltar ao portal</a>
  <div class="nav-brand">Board Academy</div>
  <div class="nav-user" id="user-name">—</div>
</nav>

<main>
  <div class="page-label">Portal Interno · Minha Área</div>
  <h1 class="page-title">Minha Página</h1>

  <!-- =============================================
       COLABORADOR: substitua o bloco abaixo pelo
       seu conteúdo (tabelas, gráficos, iframes…)
       ============================================= -->

  <div class="placeholder-box">
    <h2>Em construção</h2>
    <p>Esta é a sua área. Substitua este bloco pelo seu conteúdo — gráficos, tabelas, iframes ou qualquer coisa que precisar.</p>
    <code>Edite este arquivo: sua-pasta/index.html</code>
  </div>

  <!-- ============================================= -->

</main>

<script>
const TENANT_ID = "ea06a4f8-4a4d-4bc7-a413-9e0168e4b6b8";
const CLIENT_ID = "85f7de7e-e8f5-49e3-9d81-3d3ccf82027b";

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: window.location.origin + '/',
    navigateToLoginRequestUrl: false,
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

(async () => {
  await msalInstance.initialize();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) {
    window.location.href = '../index.html';
    return;
  }
  const firstName = accounts[0].name ? accounts[0].name.split(' ')[0] : accounts[0].username;
  document.getElementById('user-name').textContent = firstName;
})();
</script>
</body>
</html>
