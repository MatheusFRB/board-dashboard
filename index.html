<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Academy · Portal</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0D0D0D;
    --dark-mid: #161616;
    --dark-card: #1C1C1C;
    --text: #F0EDE8;
    --text-muted: #7A7572;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Fundo com textura */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Grade geométrica sutil */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 10;
    background: var(--dark-card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    padding: 56px 52px;
    width: 420px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 40px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(201,168,76,0.04);
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    margin-bottom: 40px;
  }

  .logo-line {
    width: 48px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 20px;
  }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 32px 0;
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 400;
    margin-bottom: 8px;
    color: var(--text);
  }

  .login-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 36px;
  }

  .btn-sso {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 24px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 2px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-sso::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .btn-sso:hover::before { transform: scaleX(1); }
  .btn-sso:hover { color: var(--dark); }
  .btn-sso span { position: relative; z-index: 1; }

  .ms-icon {
    position: relative;
    z-index: 1;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .status-msg {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
    min-height: 18px;
  }

  .footer-note {
    margin-top: 40px;
    font-size: 11px;
    color: rgba(122,117,114,0.5);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo-area">
    <div class="logo-line"></div>
    <div class="logo-title">Board Academy</div>
    <div class="logo-sub">Portal Interno</div>
  </div>

  <div class="divider"></div>

  <div class="login-title">Bem-vindo</div>
  <p class="login-desc">Acesse com sua conta corporativa da Board Academy para entrar no portal de ferramentas internas.</p>

  <button class="btn-sso" onclick="doLogin()">
    <svg class="ms-icon" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    <span>Entrar com Microsoft</span>
  </button>

  <div class="status-msg" id="status"></div>

  <div class="footer-note">Acesso restrito a colaboradores · Board Academy © 2026</div>
</div>

<script>
const TENANT_ID = "ea06a4f8-af74-49ad-ade9-90eedd9d720e";
const CLIENT_ID = "85f7de7e-e8f5-49e3-9d81-3d3ccf82027b";

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: "https://login.microsoftonline.com/boardacademy.com.br",
    redirectUri: window.location.origin + window.location.pathname.replace('index.html',''),
    navigateToLoginRequestUrl: false,
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const loginRequest = {
  scopes: ["User.Read"],
  prompt: "select_account"
};

async function doLogin() {
  document.getElementById('status').textContent = 'Redirecionando para login Microsoft...';
  try {
    await msalInstance.initialize();
    await msalInstance.loginPopup(loginRequest);
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      sessionStorage.setItem('ba_user', JSON.stringify(accounts[0]));
      document.getElementById('status').textContent = 'Autenticado! Redirecionando...';
      setTimeout(() => { window.location.href = 'home.html'; }, 800);
    }
  } catch (e) {
    console.error(e);
    document.getElementById('status').textContent = 'Erro no login. Tente novamente.';
  }
}

// Se já estiver autenticado, redireciona direto
(async () => {
  await msalInstance.initialize();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    sessionStorage.setItem('ba_user', JSON.stringify(accounts[0]));
    window.location.href = 'home.html';
  }
})();
</script>
</body>
</html>
